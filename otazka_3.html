<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Státnicový test ČJ - Otázka 3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .question-card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #3498db; }
        .question-title { font-weight: bold; font-size: 1.1em; margin-bottom: 15px; }
        .options label { display: block; background: #f9f9f9; padding: 10px 15px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; border: 1px solid #e0e0e0; }
        .options label:hover { background: #eef2f5; }
        .locked label { cursor: not-allowed; pointer-events: none; }
        input[type="radio"] { margin-right: 10px; }
        button { display: block; width: 100%; padding: 15px; font-size: 1.2em; background-color: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 30px; margin-bottom: 50px; }
        button:hover { background-color: #1a252f; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; }
        .explanation { margin-top: 15px; padding: 15px; border-radius: 4px; font-size: 0.95em; display: none; }
        .explanation.success { background-color: #d4edda; border-left: 5px solid #28a745; color: #155724; }
        .explanation.error { background-color: #fff3cd; border-left: 5px solid #dc3545; color: #856404; }
        #result { font-size: 1.5em; text-align: center; font-weight: bold; margin-bottom: 20px; color: #2c3e50; }
    </style>
</head>
<body>

    <h1>Státnicový test z ČJ (Otázka 3)</h1>
    <p style="text-align:center;">Psychologie čtenářství pubescenta, Normalizace, Samizdat, Exil a Karel Kryl</p>
    
    <div id="quiz-container"></div>
    <button onclick="zobrazitKonecneSkore()">Zobrazit celkové skóre</button>
    <div id="result"></div>

    <script>
        const otazky = [
            { q: "Jaké věkové období zahrnuje pubescence (druhý vzdor)?", options: ["6 - 10 let", "11 - 15 let", "15 - 18 let", "18 - 21 let"], a: 1, exp: "Pubescence pokrývá věk 11–15 let a je charakteristická tělesnými, psychickými změnami a vzdorem." },
            { q: "Co hledá pubescent v literatuře nejčastěji, pokud touží 'někam patřit'?", options: ["Poezii z 19. století", "Skupinovou identitu", "Vědecké studie", "Rozvoj slovní zásoby"], a: 1, exp: "Pubescent touží po individualitě, vymezuje se vůči dospělým a hledá skupinovou identitu." },
            { q: "Jakou hlavní funkci získává literatura v období pubescence?", options: ["Informativní", "Didaktickou", "Saturační", "Estetickou"], a: 2, exp: "Literatura získává saturační funkci, což znamená uspokojování psychických potřeb jedince (např. prožívání dobrodružství, únik od reality)." },
            { q: "Jaký typ lyriky je pro pubescenta podle poznámek většinou pochopitelný (zhruba do 9 let věku)?", options: ["Neintencionální lyrika", "Reflexivní lyrika", "Intencionální lyrika", "Meditativní lyrika"], a: 2, exp: "Intencionální lyrika (často humorná, komická) je srozumitelná do 9 let. Později je pro žáky lyrika spíše 'rébusem'." },
            { q: "Který žánr v literatuře pro pubescenty dominuje?", options: ["Lyrická poezie", "Epické žánry s napínavým dějem a šťastným koncem", "Odborná esej", "Absurdní drama"], a: 1, exp: "Pubescenti preferují epické žánry s napínavým dějem, lyrika je spíše na okraji." },
            { q: "Jak nahlížejí učitelé na čtenářství pubescentů podle výzkumu (např. Homolová)?", options: ["Přeceňují ho", "Podceňují ho", "Považují ho za ideální", "Vůbec se jím nezabývají"], a: 1, exp: "Zatímco pubescenti řadí knihy na nižší místa zájmu, učitelé často čtenáře-pubescenty podceňují." },
            { q: "Co přebralo iniciativu v motivaci ke čtení u dnešních pubescentů?", options: ["Rodiče", "Internet", "Škola", "Knihovny"], a: 1, exp: "Iniciativu přebírá internet; klasické apely na rozvoj slovní zásoby pubescenty již nemotivují." },
            { q: "Kterou událostí začíná období normalizace v Československu?", options: ["Ukončení cenzury", "Podepsání tzv. moskevských protokolů", "Vydání Dva tisíce slov", "Založením Charty 77"], a: 1, exp: "Začíná podepsáním moskevských protokolů (1968/1969), což znamenalo konec uvolňování, obnovení cenzury a čistky." },
            { q: "Na jaká témata se zaměřovali autoři oficiální literatury, aby se vyhnuli perzekuci?", options: ["Kritika režimu, politika", "Témata každodenního života, historie, venkov, sci-fi", "Náboženství, disent", "Život v emigraci"], a: 1, exp: "Autoři se vyhýbali politice a zaměřovali se na bezpečnější témata: každodenní život, historii, sci-fi." },
            { q: "Do jakého žánru spadá dílo Ladislava Fukse 'Příběh kriminálního rady'?", options: ["Humoristická groteska", "Psychologická próza o traumatizujícím vztahu otce a syna", "Sci-fi román", "Historický epos"], a: 1, exp: "Jde o psychologickou prózu z počátku 70. let o traumatizujícím vztahu otce a syna." },
            { q: "Kdo je autorem baladické novely 'Údolí včel' o fanatickém vyznavači křesťanství?", options: ["Ota Pavel", "Ladislav Fuks", "Vladimír Körner", "Bohumil Hrabal"], a: 2, exp: "Autorem baladických příběhů drásaného člověka (Údolí včel, Zánik samoty Berhof) je Vladimír Körner." },
            { q: "Jaké poválečné téma řeší Körnerovo dílo 'Zánik samoty Berhof'?", options: ["Odsun židovského obyvatelstva", "Život sudetských Němců a Čechů, tlupy nacistických wehrwolfů odmítajících konec války", "Budování socialismu ve městě", "Život studentů v Praze"], a: 1, exp: "Zabývá se prvními poválečnými týdny v Sudetech, kde operují tlupy wehrwolfů." },
            { q: "Který autor, původně sportovní reportér, psal autobiografické prózy jako 'Smrt krásných srnců' a 'Jak jsem potkal ryby'?", options: ["Radek John", "Ota Pavel", "Ladislav Fuks", "Vladimír Škutina"], a: 1, exp: "Ota Pavel psal citlivé, sportovní a přírodní autobiografické prózy." },
            { q: "Jaké společenské problémy řeší Radek John v románech 'Džínový svět' a 'Memento'?", options: ["Problémy politických vězňů", "Problematické otázky mladých lidí (včetně drogové závislosti)", "Život na vesnici", "Kolektivizace zemědělství"], a: 1, exp: "Radek John, redaktor Mladého světa, se věnoval problémům mládeže, v Mementu pak konkrétně drogové závislosti." },
            { q: "Kdo byl vůdčí osobností českého undergroundu a skupiny The Plastic People of the Universe?", options: ["Václav Havel", "Ivan Magor Jirous", "Pavel Kohout", "Ludvík Vaculík"], a: 1, exp: "Ivan 'Magor' Jirous byl uměleckým vedoucím a hybatelem undergroundu." },
            { q: "Co požadoval politický text 'Charta 77'?", options: ["Svržení komunistické strany", "Aby stát dodržoval mezinárodní dohody o lidských právech, které sám podepsal", "Ekonomickou reformu", "Návrat k volnému trhu"], a: 1, exp: "Charta 77 vyzývala stát k dodržování lidských práv." },
            { q: "Kdo založil samizdatovou edici 'Petlice' v roce 1972?", options: ["Ludvík Vaculík", "Václav Havel", "Eva Kantůrková", "Josef Škvorecký"], a: 0, exp: "Edici Petlice založil Ludvík Vaculík pro vydávání zakázaných autorů." },
            { q: "Jaký román o kolektivizaci na vesnici v 60. letech napsala Eva Kantůrková?", options: ["Přítelkyně z domu smutku", "Smuteční slavnost", "Katyně", "Sekyra"], a: 1, exp: "Smuteční slavnost je její román, který mj. vypráví o pohřbu kulaka Jana Chladila a odporu vesnice." },
            { q: "O čem pojednává próza Evy Kantůrkové 'Přítelkyně z domu smutku'?", options: ["O drogově závislé mládeži", "O jejím pobytu v ruzyňské věznici a snaze režimu zdeptat jedince", "O životě emigrantů ve Francii", "O sportovním prostředí"], a: 1, exp: "Dílo vzniklo po jejím ročním věznění a patří k vězeňské literatuře z Ruzyně počátku 80. let." },
            { q: "Kdo je autorem manifestu 'Dva tisíce slov' a románu 'Sekyra'?", options: ["Pavel Kohout", "Ludvík Vaculík", "Milan Kundera", "Ivan Klíma"], a: 1, exp: "Autorem obou je Ludvík Vaculík, fejetonista a zakladatel edice Petlice." },
            { q: "Jaký román Pavla Kohouta popisuje školu pro katy s popisy mučení jako satiru na mechanismy moci?", options: ["Z deníku kontrarevolucionáře", "Katyně", "Kde je zakopán pes", "Morčata"], a: 1, exp: "Román Katyně (1978) je satirou na mocenské praktiky." },
            { q: "Který humorista a televizní publicista byl vězněn a napsal dílo 'Prezidentův vězeň na hradě plném bláznů'?", options: ["Vladimír Škutina", "Pavel Tigrid", "Josef Škvorecký", "Ivan Jirous"], a: 0, exp: "Vladimír Škutina prohlásil, že A. Novotný je vůl, za což byl mimo jiné vězněn." },
            { q: "Kde založili manželé Josef Škvorecký a Zdena Salivarová v roce 1971 nakladatelství 'Sixty Eight Publishers'?", options: ["V Paříži", "V Londýně", "V Torontu", "V Mnichově"], a: 2, exp: "Nakladatelství Sixty Eight Publishers bylo založeno v Torontu." },
            { q: "Který román Josefa Škvoreckého je satirou z vojenského prostředí 50. let?", options: ["Mirákl", "Prima sezona", "Tankový prapor", "Příběh inženýra lidských duší"], a: 2, exp: "Tankový prapor se vyznačuje lehkostí, humorem a komikou." },
            { q: "Kdo napsal 'Kapesní průvodce inteligentní ženy po vlastním osudu'?", options: ["Milan Kundera", "Pavel Tigrid", "Josef Škvorecký", "Ludvík Vaculík"], a: 1, exp: "Pavel Tigrid, vydavatel časopisu Svědectví, byl z politických důvodů nucen dvakrát emigrovat." },
            { q: "Který autor byl zbaven státního občanství, žije v Paříži a napsal román 'Nesnesitelná lehkost bytí'?", options: ["Pavel Kohout", "Josef Škvorecký", "Milan Kundera", "Vladimír Škutina"], a: 2, exp: "Milan Kundera, řazený k postmoderně, zkoumá v tomto bestselleru osudy Tomáše a Terezy." },
            { q: "Která autorka napsala román 'Honzlová' o osudu rodiny v 50. letech?", options: ["Eva Kantůrková", "Zdena Salivarová", "Eda Kriseová", "Tereza Boučková"], a: 1, exp: "Zdena Salivarová, spoluzakladatelka torontského nakladatelství, psala nepřikrášlenou realitu." },
            { q: "Která pražská rocková kapela v čele s Milanem Hlavsou je symbolem undergroundu?", options: ["Šafrán", "The Plastic People of the Universe", "DG 307", "Půlnoc"], a: 1, exp: "The Plastic People of the Universe byla klíčovou undergroundovou kapelou." },
            { q: "Kdo byl vůdcem The Plastic People a autorem 'Magorovy labutí písně'?", options: ["Vratislav Brabenec", "Pavel Zajíček", "Ivan Magor Jirous", "Milan Hlavsa"], a: 2, exp: "Ivan Magor Jirous byl vůdčí osobností, básníkem a politickým vězněm." },
            { q: "Co znamenal název kapely DG 307?", options: ["Adresa zkušebny", "Psychiatrická diagnóza umožňující vyhnout se vojně", "Kódové označení StB", "Datum založení pozpátku"], a: 1, exp: "Název DG 307 odkazoval na psychiatrickou diagnózu chránící před vojenskou službou." },
            { q: "Jaký název mělo sdružení folkových písničkářů (vznik 1972), kde působili Hutka, Merta, Třešňák?", options: ["Šafrán", "Modrý efekt", "Petlice", "Svědectví"], a: 0, exp: "Sdružení se jmenovalo Šafrán s myšlenkou 'že šafránu je málo, svobodných umělců je málo'." },
            { q: "Který popularizátor moravských lidových písniček a signatář Charty 77 složil píseň 'Krásný je vzduch'?", options: ["Vlastimil Třešňák", "Vladimír Merta", "Jaroslav Hutka", "Karel Kryl"], a: 2, exp: "Jaroslav Hutka, který byl později donucen k emigraci do Nizozemí." },
            { q: "Která folková zpěvačka využívala hru na kytaru smyčcem a nehty?", options: ["Dáša Voňková", "Zdena Salivarová", "Eva Kantůrková", "Marta Kubišová"], a: 0, exp: "Dáša Andrtová-Voňková vynikala netradičním způsobem hry na kytaru." },
            { q: "Z jaké rodiny pocházel Karel Kryl a co se stalo s jejich podnikem?", options: ["Z rodiny komunistických pohlavárů", "Z rodiny knihtiskařů; stroje rozbili komunisté", "Z rodiny důstojníků", "Z rodiny zemědělců"], a: 1, exp: "Kryl pocházel z rodiny knihtiskařů v Kroměříži. Tiskárna byla zničena komunisty." },
            { q: "Kdy Karel Kryl emigroval do západního Německa?", options: ["1948", "1968", "1969", "1977"], a: 2, exp: "Kryl emigroval v roce 1969 a následně pracoval pro Rádio Svobodná Evropa v Mnichově." },
            { q: "Co je hlavním znakem žánru 'protestsong'?", options: ["Písně o přírodě", "Taneční rytmus", "Písně upozorňující na problémy v totalitní společnosti, snaha mobilizovat posluchače", "Humorné texty bez poselství"], a: 2, exp: "Protestsong protestuje proti bezpráví a snaží se posluchače upozornit na společenské problémy." },
            { q: "Které album vydal Kryl jako první a bylo reakcí na invazi vojsk v roce 1968?", options: ["Rakovina", "Bratříčku, zavírej vrátka", "Karavana mraků", "Maškary"], a: 1, exp: "Legendární album Bratříčku, zavírej vrátka vyšlo v roce 1969." },
            { q: "Koho symbolizují 'vojáci přijeli v hranatých železných maringotkách' v písni Bratříčku, zavírej vrátka?", options: ["Cirkus", "Sovětské tanky a invazní vojska", "Stavební dělníky", "Policii"], a: 1, exp: "Je to jasná metafora pro okupační vojska a jejich tanky v srpnu 1968." },
            { q: "Kdo vystupuje v písni 'Král a klaun' a co symbolizují?", options: ["Král (dobyvatel/Rusové) vs. klaun (umění/humanita)", "Král (Prezident) vs. klaun (občan)", "Král (kapitalismus) vs. klaun (socialismus)", "Pohádkové postavy"], a: 0, exp: "Dobyvačného krále (agresora) skolí šlak, zatímco umění a lidskost (klaun) přežijí." },
            { q: "Jaký biblický motiv využívá píseň 'Salome'?", options: ["Vzkříšení Lazara", "Zatčení Ježíše", "Tanec před Herodem a stětí Jana Křtitele", "Stavba Noemovy archy"], a: 2, exp: "Vychází z příběhu Salome, která tancem před Herodem získala hlavu Jana Křtitele." },
            { q: "Koho obhajuje a koho kritizuje píseň 'Veličenstvo Kat'?", options: ["Oslavuje státníky", "Kritizuje utajené vraždění, zkázu morálky a nedemokratický režim (Kat = vládce)", "Popisuje středověké řemeslo", "Je to humorná píseň o soudech"], a: 1, exp: "Kat představuje despotického vládce státu, kde kněz je ztotožněn s ďáblem." },
            { q: "Co naznačuje 'Důchodce' z Krylovy písně?", options: ["Úctu ke stáří v socialismu", "Sarkastický a neúprosný pohled na realitu stáří a lhostejnosti", "Úspěšný život budovatele", "Radost ze života"], a: 1, exp: "Popisuje třesoucího se důchodce jako obraz kruté reality stárnutí." },
            { q: "Co symbolizuje 'rozmlácený kostel a rozlámaný anděl' v písni Anděl?", options: ["Opravu památek", "Území teroru, lhostejnost a rozpad civilizačních (kulturních/náboženských) hodnot", "Oslavu války", "Ateismus jako pokrok"], a: 1, exp: "Kritika rozpadu hodnot. Anděl nálezci uletí, protože ten mu ukul 'ulomená křídla z mosazný nábojnice'." },
            { q: "Z jakého historického rčení vychází píseň 'Morituri te salutant'?", options: ["Z Bible", "Z pozdravu gladiátorů císaři: Jdoucí na smrt tě zdraví", "Z husitských chorálů", "Ze středověkých trubadúrů"], a: 1, exp: "Využívá starořímský pozdrav gladiátorů k navození kontrastu útrpné válečné cesty a zamilovanosti." },
            { q: "Jakou situaci vykresluje píseň 'Pieta' na náměstí pod sochou Madony?", options: ["Slavnostní bohoslužbu", "Podnapilé vojáky (okupanty), kteří znesvěcují místo a pletou se s dívkami", "Svatbu", "Vesnickou zábavu"], a: 1, exp: "Pieta ukazuje chování cizích vojáků, kteří rabují a znesvěcují." },
            { q: "O jaké události pravděpodobně pojednává 'Podivná ruleta' ('schůze v Černé nad Tisou')?", options: ["Sjezd spisovatelů", "Setkání představitelů SSSR a ČSSR před srpnovou invazí", "Volby 1946", "Mírová konference"], a: 1, exp: "Píseň reflektuje obavy z této historické schůzky, která předznamenala srpnovou okupaci." },
            { q: "Co znamená 'Znamení doby' (mříž, obavy, zbabělost)?", options: ["Symbol nebezpečí, chaosu a apatie lidí k nastalé totalitní situaci", "Ekonomická krize", "Kritika církve", "Ekologický problém"], a: 0, exp: "Je to výzva k sebekritice; lidem zůstaly svobodné jen myšlenky a propadli apatii vůči utlačujícímu režimu." },
            { q: "Proč voják v 'Píseň Neznámého vojína' nestojí o falešnou lítost delegací u jeho hrobu?", options: ["Protože je zraněný", "Protože by raději žil, než poslouchal naoko uspořádanou ceremonii od papalášů", "Protože byl pacifista", "Protože nemá rád hudbu"], a: 1, exp: "Mrtvý voják odmítá pokrytecké ceremonie a věnce, má to protiválečný význam." },
            { q: "K čemu přirovnává Kryl Rusy a národ v písni 'Jeřabiny'?", options: ["Rusy k přátelům, národ k vítězům", "Rusy k vichřici a netopýrům, národ je němý a nečinný", "Rusy k letním bouřkám", "Rusy k andělům"], a: 1, exp: "Národ se v srpnu nebrání (je němý), a nakonec 'nezbývá nic jiného, než zpívat s Rusy'." },
            { q: "Koho kritizuje 'Pasážová revolta'?", options: ["Jen komunisty", "Apatické mladé lidi, kteří žijí 've svých životech', nadávají, ale pro změnu nic nedělají", "Důchodce", "Exilové autory"], a: 1, exp: "Kritizuje lhostejnost a 'nicnedělání' tehdejší mládeže a zrady mezi kamarády." }
        ];

        let score = 0; let answeredQuestions = 0;
        const container = document.getElementById('quiz-container');

        otazky.forEach((otazka, index) => {
            const card = document.createElement('div'); card.className = 'question-card'; card.id = `q-card-${index}`;
            const title = document.createElement('div'); title.className = 'question-title'; title.textContent = `${index + 1}. ${otazka.q}`; card.appendChild(title);
            const optionsDiv = document.createElement('div'); optionsDiv.className = 'options';

            otazka.options.forEach((opt, optIndex) => {
                const label = document.createElement('label'); const radio = document.createElement('input');
                radio.type = 'radio'; radio.name = `q${index}`; radio.value = optIndex;
                
                radio.addEventListener('change', function() {
                    const currentCard = document.getElementById(`q-card-${index}`);
                    const allRadios = currentCard.querySelectorAll('input[type="radio"]');
                    const labels = currentCard.querySelectorAll('label');
                    const expDiv = document.getElementById(`exp${index}`);
                    
                    allRadios.forEach(r => r.disabled = true); currentCard.classList.add('locked');
                    const selectedVal = parseInt(this.value); const correctVal = otazky[index].a;
                    labels[correctVal].classList.add('correct');

                    if (selectedVal === correctVal) {
                        score++; expDiv.className = 'explanation success';
                        expDiv.innerHTML = `<strong>Správně!</strong><br><strong>Zdůvodnění:</strong> ${otazky[index].exp}`;
                    } else {
                        labels[selectedVal].classList.add('incorrect'); expDiv.className = 'explanation error';
                        expDiv.innerHTML = `<strong>Špatně.</strong><br><strong>Správná odpověď:</strong> <em>${otazky[index].options[correctVal]}</em><br><strong>Zdůvodnění:</strong> ${otazky[index].exp}`;
                    }
                    expDiv.style.display = 'block'; answeredQuestions++;
                });

                label.appendChild(radio); label.appendChild(document.createTextNode(opt)); optionsDiv.appendChild(label);
            });
            card.appendChild(optionsDiv);
            const explanationDiv = document.createElement('div'); explanationDiv.className = 'explanation'; explanationDiv.id = `exp${index}`;
            card.appendChild(explanationDiv); container.appendChild(card);
        });

        function zobrazitKonecneSkore() {
            const resultDiv = document.getElementById('result');
            if (answeredQuestions < otazky.length) {
                resultDiv.style.color = '#e67e22'; resultDiv.innerHTML = `Zatím jste odpověděl/a na ${answeredQuestions} z ${otazky.length} otázek. <br> Průběžné skóre: ${score} správně.`; return;
            }
            const percent = Math.round((score / otazky.length) * 100); resultDiv.innerHTML = `Váš konečný výsledek: ${score} z ${otazky.length} bodů (${percent} %).`;
        }
    </script>
</body>
</html>
