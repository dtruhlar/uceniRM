    <h1>Státnicový test z ČJ (Otázka 5)</h1>
    <p style="text-align:center;">Didaktika (Literární dílo jako učivo a umění) a Dramatická tvorba 2. pol. 19. století</p>
    
    <div id="quiz-container"></div>
    <button onclick="zobrazitKonecneSkore()">Zobrazit celkové skóre</button>
    <div id="result"></div>

    <script>
        const otazky = [
            { q: "Z jakých tří složek se skládá obsah školního vzdělávání?", options: ["Vědomosti, dovednosti a hodnotová orientace žáka", "Teorie, praxe a historie", "Čtení, psaní a recitace", "Autor, dílo a kontext"], a: 0, exp: "Učivo školního vzdělávání obsahuje tři složky: vědomosti, dovednosti a hodnotovou orientaci žáka." },
            { q: "Jaké dvě hlavní složky má literární výchova?", options: ["Informativní (poznatky) a komunikativní (recepce)", "Naukobou a memorovací", "Subjektivní a objektivní", "Estetickou a hudební"], a: 0, exp: "Literární výchova má podle poznámek dvě složky: informativní (poznatky) a komunikativní (recepce)." },
            { q: "Jak nahlíží didaktika na umělecký text?", options: ["Výhradně jako na učivo k naučení zpaměti", "Výhradně jako na nedotknutelné umění", "Zároveň jako na učivo i umění (didaktické zúročení estetické funkce)", "Jako na zastaralý materiál"], a: 2, exp: "Text je zároveň uměním i učivem, což představuje didaktické zúročení estetické funkce." },
            { q: "Jak se dnešní didaktici dívají na starší představu, že umělecká síla literatury je 'odolná vůči učivu'?", options: ["Považují ji za správnou", "Považují ji za naivní, protože prvky izolované analýzy by nebyly estetické", "Považují ji za jedinou vědecky prokázanou", "Ignorují ji"], a: 1, exp: "Starší didaktici věřili, že síla literatury je vůči učivu odolná, což dnes považujeme za naivní." },
            { q: "Kdo se ve svém pojetí vyučování snažil vymanit literární text z didaktického systému a absolutizoval text jako umění?", options: ["Petr Poslední", "Ondřej Hník", "Bohuslav Hoffman", "František Adolf Šubert"], a: 2, exp: "Bohuslav Hoffman se snažil absolutizovat literární text jako umění a vymanit ho z didaktického systému." },
            { q: "Který z teoretiků odmítá důraz na vědecko-historickou stránku literatury a prosazuje četbu orientovanou na čtenářskou sebereflexi?", options: ["Ondřej Hník", "Petr Poslední", "Bohuslav Hoffman", "J. N. Mayr"], a: 1, exp: "Petr Poslední odmítá důraz na vědecko-historickou stránku a klade důraz na umělecké a sebereflexivní čtenářské hledisko." },
            { q: "Kterou metodu bychom měli zvolit, pokud chceme žákům zprostředkovat text čistě jako 'umění'?", options: ["Vypsat jména postav", "Volný rozhovor (tvořivý přístup k textu)", "Reprodukce přesného děje z osnov", "Napsání písemky"], a: 1, exp: "Při pojetí textu jako umění se využívá volný rozhovor, zatímco u textu jako učiva reprodukce příběhu." },
            { q: "Čeho bychom se měli vyvarovat při uvádění textu před samotnou četbou?", options: ["Nesmíme zmínit jméno autora", "Poskytovat příliš mnoho informací a motivovat nesmyslně tajemnem", "Prozradit žánr textu", "Vůbec mluvit k žákům"], a: 1, exp: "Abychom žáky nemotivovali špatně, neměli bychom jim poskytovat příliš mnoho informací a zbytečně je motivovat „tajemnem“." },
            { q: "Co je podle vašich materiálů cílem u uměleckého textu vůči čtenáři?", options: ["Vychovat kultivovaného čtenáře schopného zhodnotit komunikaci s dílem", "Aby se z něj stal budoucí spisovatel", "Aby zpaměti odříkal obsah klasiky", "Aby přečetl minimálně 10 knih měsíčně"], a: 0, exp: "Kultivovaný čtenář by měl být schopen zhodnotit čtenářskou komunikaci s díly krásné literatury." },
            { q: "Jakými otázkami povzbuzuje Petr Poslední interpretaci?", options: ["Kdy se autor narodil?", "Kde se příběh odehrává?", "Co bys na hrdinově místě dělal a co bys z četby namaloval?", "V jakém nakladatelství kniha vyšla?"], a: 2, exp: "P. Poslední ve svých otázkách pro interpretaci vybízí žáky k přemýšlení, jak by se zachovali na místě hrdiny a jak to na ně zapůsobilo." },
            { q: "Pokud text posuzujeme primárně jako 'učivo', která metoda je na místě?", options: ["Metoda tvůrčího psaní", "Reprodukce příběhu či vyjmenování postav", "Volný rozhovor nespadající do didaktiky", "Improvizovaná scénka"], a: 1, exp: "Když je text vnímán primárně jako učivo, přistupuje se k metodám jako reprodukce příběhu nebo vyjmenování postav." },
            { q: "Ve kterém roce byla otevřena první česká divadelní scéna – Prozatímní divadlo?", options: ["1848", "1862", "1868", "1881"], a: 1, exp: "Prozatímní divadlo, jako první česká divadelní scéna, bylo otevřeno v roce 1862." },
            { q: "Kdo zásadně prosadil výstavbu Prozatímního divadla skrze Sbor pro zbudování ND?", options: ["František Palacký", "Josef Zítek", "František Ladislav Rieger", "Josef Kajetán Tyl"], a: 2, exp: "Výstavbu Prozatímního divadla prosadil František Ladislav Rieger." },
            { q: "Jakou hrou zahajovalo Prozatímní divadlo svou činnost?", options: ["Braniboři v Čechách (Smetana)", "Baron Goertz (Bozděch)", "Jedenácté přikázání (Šamberk)", "Král Vukašín (Hálek)"], a: 3, exp: "Prozatímní divadlo zahajovalo svou činnost historickým dramatem Král Vukašín od Vítězslava Hálka." },
            { q: "Kdo byl autorem historických dramat Baron Goertz a Dobrodruzi (a odešel z divadla pro neshody)?", options: ["Emanuel Bozděch", "Ladislav Stroupežnický", "František Ferdinand Šamberk", "Jan Nepomuk Mayr"], a: 0, exp: "Emanuel Bozděch byl významný dramatik historických her (Baron Goertz, Dobrodruzi)." },
            { q: "Který rok byl položen základní kámen Národního divadla?", options: ["1862", "1868", "1881", "1883"], a: 1, exp: "Základní kámen Národního divadla byl položen 16. 5. 1868 a obsahoval 19 kamenů z různých míst." },
            { q: "Kdo byl architektem budovy Národního divadla?", options: ["Vojtěch Hynais", "Josef Zítek", "Josef Schulz", "Mikoláš Aleš"], a: 1, exp: "Architektem novorenesanční stavby Národního divadla byl Josef Zítek." },
            { q: "Který malíř je autorem slavné opony Národního divadla?", options: ["Josef Ženíšek", "Václav Brožík", "Vojtěch Hynais", "Mikoláš Aleš"], a: 2, exp: "Slavnou oponu Národního divadla vytvořil Vojtěch Hynais." },
            { q: "Jakým dílem bylo 1. otevření ND v roce 1881 slavnostně zahájeno (za přítomnosti prince Rudolfa)?", options: ["Smetanovou operou Libuše", "Dvořákovou Rusalkou", "Tyllovým Strakonickým dudákem", "Stroupežnického Našimi furianty"], a: 0, exp: "První otevření ND proběhlo v roce 1881 a hrála se Smetanova opera Libuše." },
            { q: "Kdo převzal práce na obnově Národního divadla po zničujícím požáru v roce 1881?", options: ["Josef Zítek", "Josef Schulz", "František Adolf Šubert", "Jan Nepomuk Mayr"], a: 1, exp: "Po požáru ND v roce 1881 se vybralo 1 milion zlatých a nové práce vedl Josef Schulz." },
            { q: "Kdy se uskutečnilo 2. (definitivní) otevření Národního divadla?", options: ["1881", "1883", "1894", "1868"], a: 1, exp: "K definitivnímu otevření došlo roku 1883." },
            { q: "Jaký je definován rozdíl mezi operou a operetou v repertoáru 19. století?", options: ["Opera je zcela mluvená, opereta pouze zpívaná", "Opera je snoubení hudby s uměleckým textem, opereta je mluvené slovo spojené se zpěvem", "Opereta je pouze pro cizojazyčné hry, opera pro české", "Žádný, jde o synonyma"], a: 1, exp: "Opereta je snoubení mluveného slova a zpěvu, do tohoto žánru spadá např. Polská krev od Oskara Nedbala." },
            { q: "Kdo v roce 1887 ostře kritizoval tehdejší novoromantismus a dal tak podnět ke vzniku českého realistického dramatu?", options: ["Karel Čapek", "T. G. Masaryk v časopise Čas", "František Palacký v Lumíru", "Alois Mrštík ve Světozoru"], a: 1, exp: "České realistické drama vymezil svou kritikou novoromantismu T. G. Masaryk v roce 1887." },
            { q: "O čem vypráví drama 'Jan Výrava' (autor F. A. Šubert)?", options: ["O bojích husitů proti Zikmundovi", "O zámožném sedlákovi, který se přidá na stranu nespokojených vesničanů", "O chudém měšťanovi, který nalezne poklad", "O básníku v renesanční Praze"], a: 1, exp: "Drama pojednává o zámožném sedlákovi, který se postaví na stranu vzbouřených vesničanů." },
            { q: "Kdo byl po druhém otevření ND jeho prvním dramaturgem, ačkoliv měl po pokusu o sebevraždu zohavený obličej?", options: ["Emanuel Bozděch", "František Adolf Šubert", "Ladislav Stroupežnický", "Jan Nepomuk Mayr"], a: 2, exp: "Dramaturgem Národního divadla při jeho druhém otevření se stal Ladislav Stroupežnický." },
            { q: "Kde se odehrává slavná hra 'Naši furianti' od L. Stroupežnického?", options: ["Ve Slezsku", "V jihočeské vesnici Honice", "Na moravské Hané", "V Krkonoších"], a: 1, exp: "Děj dramatu Naši furianti se odehrává v jihočeské vesnici Honice." },
            { q: "O jaké povolání (post) spolu vesničané (voják Bláha vs. krejčí Fiala) ve hře Naši furianti soupeří?", options: ["O post starosty", "O post učitele", "O post místního lékaře", "O post ponocného"], a: 3, exp: "Ve hře Naši furianti spolu bojují vysloužilý voják Bláha a krejčí Fiala o místo ponocného." },
            { q: "Která historická postava vystupuje v L. Stroupežnického veselohrách Paní mincmistrová a Zvíkovský rarášek?", options: ["Jan Hus", "Básník Mikuláš Dačický z Heslova", "Karel IV.", "Mistr Jan z Rokycan"], a: 1, exp: "Veselohry Paní mincmistrová a Zvíkovský rarášek vyprávějí o básníku Mikuláši Dačickém z Heslova." },
            { q: "Kteří spisovatelé a intelektuálové ovlivnili tvorbu Gabriely Preissové?", options: ["Masaryk a Šalda", "Arbes, Karolina Světlá a Eliška Krásnohorská", "Tyl a Mácha", "Mrštíkové a Čapek"], a: 1, exp: "Gabriela Preissová psala dramata kritizující majetek a s důrazem na ženské role. Tvorba byla ovlivněna Arbesem, Světlou a Krásnohorskou." },
            { q: "Jaký osud potká hlavní hrdinku Evu na konci tragédie Gazdina roba (od G. Preissové)?", options: ["Zůstane s Mánkem šťastně až do smrti", "Zavraždí Mánka ze msty", "Zoufalá skočí do Dunaje, když Mánek podlehne nátlaku matky", "Stane se úspěšnou podnikatelkou ve Vídni"], a: 2, exp: "Hlavní hrdinka Gazdiny roby, Eva, uteče s Mánkem, ale po jeho donuceném návratu skočí do Dunaje." },
            { q: "Který skladatel složil slavnou operu 'Eva', inspirovanou Gazdinou robou?", options: ["Bedřich Smetana", "Antonín Dvořák", "Josef Bohuslav Foerster", "Leoš Janáček"], a: 2, exp: "Operní zpracování dramatu Gazdina roba (s názvem Eva) složil Josef Bohuslav Foerster." },
            { q: "Co strašlivého spáchá Kostelnička v dramatu 'Její pastorkyňa' od Preissové?", options: ["Zabije Jenůfu ze žárlivosti", "Utopí Jenůfčino nemanželské dítě pod ledem, aby zachránila její pověst", "Podpálí mlýn", "Udá Laca četníkům"], a: 1, exp: "V dramatu Její pastorkyňa Kostelnička utopí Jenůfčino dítě pod ledem, aby uchránila její čest." },
            { q: "Kdo je autorem světoznámé opery podle hry 'Její pastorkyňa'?", options: ["Bohuslav Martinů", "Leoš Janáček", "Bedřich Smetana", "Zdeněk Fibich"], a: 1, exp: "Operu Její pastorkyňa vytvořil hudební skladatel Leoš Janáček." },
            { q: "Jakou rozsáhlou románovou kroniku zachycující detailní život, zvyklosti a tradice na Hané napsal Alois Mrštík?", options: ["Rok na vsi", "Santa Lucia", "Naši furianti", "Dědina"], a: 0, exp: "Alois Mrštík je autorem rozsáhlé románové kroniky Rok na vsi." },
            { q: "Jaký cizí jazyk ovládal Vilém Mrštík a přinášel z něj do Čech vlivy kritického realismu?", options: ["Francouzštinu", "Němčinu", "Ruštinu", "Angličtinu"], a: 2, exp: "Vilém Mrštík překládal z ruštiny a byl ovlivněn kritickým realismem." },
            { q: "O čem je lyrický příběh 'Pohádka máje' (od Viléma Mrštíka)?", options: ["O chudém pražském studentovi", "O lásce dcery revírníka Helenky k právníkovi Ríšovi v přírodním prostředí", "O politických vězních", "O husitských bojích"], a: 1, exp: "Pohádka máje vypráví o lásce dcery revírníka Helenky k právníkovi Ríšovi." },
            { q: "Kdo je hlavním hrdinou románu Santa Lucia (V. Mrštík) a jaký je jeho osud?", options: ["Mlynář Vávra, kterého otráví", "Voják Bláha, který se stane starostou", "Chudý student Jordán, který v Praze umírá na tuberkulózu", "Bohatý sedlák, který uteče do Vídně"], a: 2, exp: "V románu Santa Lucia zachycuje V. Mrštík osud chudého studenta Jordána, který v Praze umírá na TBC." },
            { q: "Jaký literární žánr měla původně Maryša být, než ji bratři přetvořili v drama?", options: ["Epos", "Lyrická báseň", "Román", "Operní libreto"], a: 2, exp: "Drama Maryša od bratrů Mrštíků mělo původně být románem (jak zamýšlel Alois)." },
            { q: "Které dvě jednání (akty) v Maryše jsou zcela smyšlená autory a neopírají se o skutečný případ?", options: ["První a pátý", "Třetí a čtvrtý", "První a čtvrtý", "Druhý a třetí"], a: 2, exp: "V dramatu Maryša jsou zcela smyšlené a přidané autory první a čtvrtý akt." },
            { q: "Komu bratři Mrštíkové hru Maryša (1894) věnovali?", options: ["Svému otci", "Národnímu divadlu", "Památce své matky", "T. G. Masarykovi"], a: 2, exp: "Maryša byla vydána jako kniha roku 1894 a je věnována památce matky bratrů Mrštíků." },
            { q: "Jaká je povaha otce Lízala a uvědomí si někdy na konci hry svou chybu?", options: ["Je štědrý a laskavý, chybu si neuvědomí", "Je to lakomý vychytralec; na konci hry si chybu uvědomuje a podvědomě se bojí o dceru", "Je to ziskuchtivý tyran, který nikdy nelituje", "Je to blázen, kterého na konci zavřou"], a: 1, exp: "Postava sedláka Lízala je líčena jako lakomá a vychytralá; na konci díla si však svou chybu uvědomuje a podvědomě se bojí o osud dcery." },
            { q: "Jakou profesi a povahu má Maryšin manžel Vávra?", options: ["Čtyřicetiletý mlynář, vdovec, surový, bezcitný a ziskuchtivý", "Padesátiletý starosta, laskavý, ale hloupý", "Mladý voják, agresivní, ale spravedlivý", "Starý krejčí, pomstychtivý"], a: 0, exp: "Vávra je mlynář, vdovec a je charakterizován jako surový, bezcitný a ziskuchtivý." },
            { q: "Co ve skutečnosti přiměje Maryšu poslechnout rodiče a vzít si Vávru (kterého nenávidí)?", options: ["Láska k jeho penězům", "Zjištění, že Francek padl ve válce", "Výhra zvyků nad rozumem, silná víra v tradice a manželství chápané jako povinnost", "Slib, že ji odvezou do Ameriky"], a: 2, exp: "Maryšu láme především silná víra v tradice (výhra zvyků nad rozumem, manželství chápe jako povinnost)." },
            { q: "Kdo je Francek?", options: ["Starý ponocný v obci", "Vávrovi nejlepší kamarád", "Chudý, smělý, hrdý rekrut, který miluje Maryšu a protestuje proti jejímu sňatku", "Lízalův tajný syn z prvního manželství"], a: 2, exp: "Francek je chudý, hrdý, milující rekrut, který protestuje proti nešťastnému manželství Maryši." },
            { q: "Jakou roli hraje Maryščina matka, Lízalka, při dojednávání sňatku?", options: ["Zastává se Maryši proti otci", "Je to tvrdá, umíněná a nesmlouvavá žena, která dceru k sňatku nutí i přes její pláč", "Do věci vůbec nezasahuje a nechává rozhodnout tetičku Strouhalku", "Hrozí, že pokud Maryšu provdají, odejde od muže"], a: 1, exp: "Lízalka, matka Maryši, je charakterizována jako tvrdá, umíněná a nesmlouvavá žena, která sňatek nutí." },
            { q: "Co zásadního udělá Francek ve 3. jednání poté, co se po dvou letech vrátí z vojny?", options: ["Omluví se Vávrovi a smíří se", "Zavře se doma a s nikým nemluví", "Strhne v hospodě rvačku s Vávrou a křičí, že za Maryšou bude dál chodit", "Pokusí se zapálit mlýn"], a: 2, exp: "Po návratu z vojny (3. jednání) Francek strhne bitku v hospodě s Vávrou a křičí, že za Maryšou bude i nadále chodit." },
            { q: "Čím se Vávra ve 4. jednání (vyvrcholení) pokusí vyřešit to, že Francek navštěvuje Maryšu?", options: ["Požádá Lízala o pomoc", "Střílí po Franckovi z pušky (ale mine ho)", "Dá Franckovi peníze, aby odešel z vesnice", "Zbije Maryšu před očima celé vesnice"], a: 1, exp: "Ve 4. jednání střílí Vávra z pušky po Franckovi, když ho najde u domu rozmlouvat s Maryšou, ale mine." },
            { q: "Jaký jed nakonec Maryša Vávrovi podá a do čeho jej zamíchá?", options: ["Cyankáli do vína", "Strychnin do polévky", "Arsenik do černé kávy", "Jed na krysy do čaje"], a: 2, exp: "V závěrečném (5.) jednání Maryša Vávrovi nasype arsenik do černé kávy a on po vypití umírá." },
            { q: "Co znamenají ve hře (z moravského dialektu) slova 'kordulka' a 'fěrtoch'?", options: ["Miska a lžíce", "Klobouk a boty", "Vesta a zástěra", "Slivovice a víno"], a: 2, exp: "Moravismus 'kordulka' znamená vestu a 'fěrtoch' znamená zástěru." },
            { q: "Jakým způsobem k sobě hovoří Maryša se svým otcem (což je také prvkem dobového realismu)?", options: ["Maryša otci tyká, otec dceři vyká", "Zásadně spolu nemluví a používají prostředníka", "Oslovují se vznešenými tituly", "Vzájemně si vykají (vykání dcery s otcem)"], a: 3, exp: "Výrazným prvkem kritického realismu v Maryše je to, že si Maryša s otcem navzájem vykají." },
            { q: "V jakém aktu se Maryša definitivně obléká do kroje a s pláčem po nátlaku rodičů a Strouhalky odjíždí s Vávrou na ohlášky?", options: ["V 1. jednání", "Ve 2. jednání", "Ve 3. jednání", "Ve 4. jednání"], a: 1, exp: "Ve 2. jednání po nátlaku Lízalky a Strouhalky se Maryša podvolí, oblékne se do kroje a odjíždí s Vávrou na ohlášky." }
        ];

        let score = 0; let answeredQuestions = 0;
        const container = document.getElementById('quiz-container');

        otazky.forEach((otazka, index) => {
            const card = document.createElement('div'); card.className = 'question-card'; card.id = `q-card-${index}`;
            const title = document.createElement('div'); title.className = 'question-title'; title.textContent = `${index + 1}. ${otazka.q}`; card.appendChild(title);
            const optionsDiv = document.createElement('div'); optionsDiv.className = 'options';

            otazka.options.forEach((opt, optIndex) => {
                const label = document.createElement('label'); const radio = document.createElement('input');
                radio.type = 'radio'; radio.name = `q${index}`; radio.value = optIndex;
                
                radio.addEventListener('change', function() {
                    const currentCard = document.getElementById(`q-card-${index}`);
                    const allRadios = currentCard.querySelectorAll('input[type="radio"]');
                    const labels = currentCard.querySelectorAll('label');
                    const expDiv = document.getElementById(`exp${index}`);
                    
                    allRadios.forEach(r => r.disabled = true); currentCard.classList.add('locked');
                    const selectedVal = parseInt(this.value); const correctVal = otazky[index].a;
                    labels[correctVal].classList.add('correct');

                    if (selectedVal === correctVal) {
                        score++; expDiv.className = 'explanation success';
                        expDiv.innerHTML = `<strong>Správně!</strong><br><strong>Zdůvodnění:</strong> ${otazky[index].exp}`;
                    } else {
                        labels[selectedVal].classList.add('incorrect'); expDiv.className = 'explanation error';
                        expDiv.innerHTML = `<strong>Špatně.</strong><br><strong>Správná odpověď:</strong> <em>${otazky[index].options[correctVal]}</em><br><strong>Zdůvodnění:</strong> ${otazky[index].exp}`;
                    }
                    expDiv.style.display = 'block'; answeredQuestions++;
                });

                label.appendChild(radio); label.appendChild(document.createTextNode(opt)); optionsDiv.appendChild(label);
            });
            card.appendChild(optionsDiv);
            const explanationDiv = document.createElement('div'); explanationDiv.className = 'explanation'; explanationDiv.id = `exp${index}`;
            card.appendChild(explanationDiv); container.appendChild(card);
        });

        function zobrazitKonecneSkore() {
            const resultDiv = document.getElementById('result');
            if (answeredQuestions < otazky.length) {
                resultDiv.style.color = '#e67e22'; resultDiv.innerHTML = `Zatím jste odpověděl/a na ${answeredQuestions} z ${otazky.length} otázek. <br> Průběžné skóre: ${score} správně.`; return;
            }
            const percent = Math.round((score / otazky.length) * 100); resultDiv.innerHTML = `Váš konečný výsledek: ${score} z ${otazky.length} bodů (${percent} %).`;
        }
    </script>
</body>
</html>
